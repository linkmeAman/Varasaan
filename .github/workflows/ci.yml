name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title-lint:
    name: pr-title-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Lint PR title
        if: github.event_name == 'pull_request'
        run: node ./scripts/ci/lint-pr-title.mjs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}

      - name: Lint commit messages in PR
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.cjs

      - name: Skip on push
        if: github.event_name != 'pull_request'
        run: echo "PR title lint is only required for pull_request events."

  contract-sync:
    name: contract-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.5.18'
          enable-cache: true
          cache-dependency-glob: backend/pyproject.toml

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev

      - name: Generate canonical OpenAPI artifact
        run: uv run --project backend python backend/scripts/generate_openapi.py

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Regenerate frontend API types
        run: npm --prefix frontend run generate:api

      - name: Check generated artifacts are committed
        run: |
          git diff --exit-code -- \
            packages/shared/openapi/openapi.generated.json \
            frontend/src/api/openapi-types.ts \
            frontend/src/lib/generated/api-client.ts

  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    needs: contract-sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.5.18'
          enable-cache: true
          cache-dependency-glob: backend/pyproject.toml

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev

      - name: Ruff
        run: uv run --project backend ruff check backend/src backend/tests

      - name: MyPy
        run: uv run --project backend mypy backend/src

      - name: Pytest
        run: uv run --project backend pytest backend/tests

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    needs: contract-sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: ESLint
        run: npm --prefix frontend run lint

      - name: Typecheck
        run: npm --prefix frontend run typecheck

      - name: Vitest smoke
        run: npm --prefix frontend run test:smoke

      - name: Build
        run: npm --prefix frontend run build

  infra-validate:
    name: infra-validate
    runs-on: ubuntu-latest
    env:
      TF_PLAN_ENABLED: ${{ vars.TF_PLAN_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect Terraform files
        id: tf
        run: |
          if [ -z "$(find infra -name '*.tf' -print -quit 2>/dev/null)" ]; then
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.tf.outputs.has_tf == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.1

      - name: Setup TFLint
        if: steps.tf.outputs.has_tf == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.56.0

      - name: Terraform fmt check
        if: steps.tf.outputs.has_tf == 'true'
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform init/validate (staging)
        if: steps.tf.outputs.has_tf == 'true'
        run: |
          terraform -chdir=infra/environments/staging init -backend=false
          terraform -chdir=infra/environments/staging validate

      - name: Terraform init/validate (production)
        if: steps.tf.outputs.has_tf == 'true'
        run: |
          terraform -chdir=infra/environments/production init -backend=false
          terraform -chdir=infra/environments/production validate

      - name: TFLint
        if: steps.tf.outputs.has_tf == 'true'
        run: |
          tflint --chdir=infra/environments/staging
          tflint --chdir=infra/environments/production

      - name: Optional Terraform plan
        if: steps.tf.outputs.has_tf == 'true' && env.TF_PLAN_ENABLED == 'true' && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Plan (staging and production)
        if: steps.tf.outputs.has_tf == 'true' && env.TF_PLAN_ENABLED == 'true' && vars.AWS_TERRAFORM_PLAN_ROLE_ARN != ''
        run: |
          terraform -chdir=infra/environments/staging plan -input=false -lock=false -detailed-exitcode || [ $? -eq 2 ]
          terraform -chdir=infra/environments/production plan -input=false -lock=false -detailed-exitcode || [ $? -eq 2 ]

      - name: No Terraform detected
        if: steps.tf.outputs.has_tf != 'true'
        run: echo "No Terraform configuration detected under infra/."

  critical-path-e2e:
    name: critical-path-e2e
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
      - infra-validate
    timeout-minutes: 25
    env:
      PYTHONPATH: backend/src
      DATABASE_URL: sqlite+aiosqlite:////tmp/varasaan-e2e.db
      AUTO_CREATE_SCHEMA: 'true'
      MOCK_EXTERNAL_SERVICES: 'true'
      CELERY_TASK_ALWAYS_EAGER: 'true'
      DEBUG: 'true'
      EMAIL_PROVIDER: log
      LOGIN_RATE_LIMIT_PER_MINUTE: '50'
      SIGNUP_RATE_LIMIT_PER_HOUR: '50'
      RESET_RATE_LIMIT_PER_HOUR: '50'
      JWT_SECRET_KEY: ci-cookie-auth-secret
      RAZORPAY_WEBHOOK_SECRET: whsec_test
      FRONTEND_BASE_URL: http://127.0.0.1:3000
      API_BASE_URL: http://127.0.0.1:8000
      CORS_ALLOW_ORIGINS: http://127.0.0.1:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8000
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: '0.5.18'
          enable-cache: true
          cache-dependency-glob: backend/pyproject.toml

      - name: Install backend dependencies
        run: uv sync --project backend --extra dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Start backend
        run: |
          uv run --project backend uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Start frontend
        run: |
          cd frontend
          npm run start -- --hostname 127.0.0.1 --port 3000 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for stack readiness
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null && curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'Backend log:'
          cat backend.log || true
          echo 'Frontend log:'
          cat frontend.log || true
          exit 1

      - name: Run Playwright critical path
        run: npm --prefix frontend run test:e2e

      - name: Print app logs on failure
        if: failure()
        run: |
          echo 'Backend log:'
          cat backend.log || true
          echo 'Frontend log:'
          cat frontend.log || true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-path-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            backend.log
            frontend.log
          if-no-files-found: ignore

      - name: Stop app stack
        if: always()
        run: |
          kill $(cat backend.pid) $(cat frontend.pid) 2>/dev/null || true
