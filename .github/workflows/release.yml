name: release

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install release tooling
        run: npm install --no-package-lock

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Resolve release tag
        id: release_tag
        run: |
          tag=$(git tag --points-at HEAD "v*" | sort -V | tail -n 1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release manifest
        if: steps.release_tag.outputs.tag != ''
        run: |
          cat > release-manifest.json <<EOF
          {
            "release_tag": "${{ steps.release_tag.outputs.tag }}",
            "release_commit_sha": "$(git rev-parse HEAD)",
            "backend_image_tag": "${{ steps.release_tag.outputs.tag }}",
            "backend_image_sha_tag": "${{ github.event.workflow_run.head_sha }}",
            "frontend_deploy_provider": "vercel"
          }
          EOF

      - name: Upload release manifest artifact
        if: steps.release_tag.outputs.tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ steps.release_tag.outputs.tag }}
          path: release-manifest.json

      - name: Upload release manifest to GitHub release
        if: steps.release_tag.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release_tag.outputs.tag }}" \
            release-manifest.json \
            --clobber

      - name: No release generated
        if: steps.release_tag.outputs.tag == ''
        run: echo "No new semantic release was published for this commit range."
