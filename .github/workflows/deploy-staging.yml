name: deploy-staging

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

jobs:
  build-backend-image:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.STAGING_ECR_REPOSITORY }}:${{ github.event.workflow_run.head_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.STAGING_ECR_REPOSITORY }}:main

      - id: image
        run: |
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ vars.STAGING_ECR_REPOSITORY }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  run-migrations:
    runs-on: ubuntu-latest
    needs: build-backend-image
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Alembic migration task
        run: |
          subnets_json=$(printf '%s' "${{ vars.STAGING_PRIVATE_SUBNETS }}" | jq -R 'split(",")')
          sgs_json=$(printf '%s' "${{ vars.STAGING_SECURITY_GROUPS }}" | jq -R 'split(",")')
          network_config=$(jq -n --argjson subnets "$subnets_json" --argjson sgs "$sgs_json" '{awsvpcConfiguration:{subnets:$subnets,securityGroups:$sgs,assignPublicIp:"DISABLED"}}')

          task_arn=$(aws ecs run-task \
            --cluster "${{ vars.STAGING_ECS_CLUSTER }}" \
            --task-definition "${{ vars.STAGING_MIGRATION_TASK_DEFINITION }}" \
            --launch-type FARGATE \
            --count 1 \
            --network-configuration "$network_config" \
            --query 'tasks[0].taskArn' \
            --output text)

          if [ "$task_arn" = "None" ] || [ -z "$task_arn" ]; then
            echo "Failed to start migration task."
            exit 1
          fi

          aws ecs wait tasks-stopped --cluster "${{ vars.STAGING_ECS_CLUSTER }}" --tasks "$task_arn"

          exit_code=$(aws ecs describe-tasks \
            --cluster "${{ vars.STAGING_ECS_CLUSTER }}" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$exit_code" != "0" ]; then
            echo "Migration task failed with exit code $exit_code"
            exit 1
          fi

  deploy-backend:
    runs-on: ubuntu-latest
    needs:
      - build-backend-image
      - run-migrations
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register task definition with immutable image digest
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.STAGING_TASK_DEFINITION_FAMILY }}" \
            --query taskDefinition > task-definition.json

          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-definition.json > task-definition.stripped.json

          jq --arg IMAGE "${{ needs.build-backend-image.outputs.image_uri }}" --arg CONTAINER "${{ vars.STAGING_TASK_CONTAINER_NAME }}" '
            .containerDefinitions |= map(if .name == $CONTAINER then .image = $IMAGE else . end)
          ' task-definition.stripped.json > task-definition.updated.json

          register_output=$(aws ecs register-task-definition --cli-input-json file://task-definition.updated.json)
          new_task_def_arn=$(echo "$register_output" | jq -r '.taskDefinition.taskDefinitionArn')
          echo "task_definition_arn=$new_task_def_arn" >> "$GITHUB_OUTPUT"

      - name: Update ECS service and wait for stability
        run: |
          aws ecs update-service \
            --cluster "${{ vars.STAGING_ECS_CLUSTER }}" \
            --service "${{ vars.STAGING_ECS_SERVICE }}" \
            --task-definition "${{ steps.taskdef.outputs.task_definition_arn }}"

          aws ecs wait services-stable \
            --cluster "${{ vars.STAGING_ECS_CLUSTER }}" \
            --services "${{ vars.STAGING_ECS_SERVICE }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build and deploy frontend to Vercel (preview)
        id: deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          npm ci
          npx --yes vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"
          npx --yes vercel@latest build --token="$VERCEL_TOKEN"
          preview_url=$(npx --yes vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")
          if [[ "$preview_url" != http* ]]; then
            preview_url="https://$preview_url"
          fi
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

  smoke-checks:
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend
    steps:
      - name: Backend health smoke check
        run: |
          curl -fsSL "${{ vars.STAGING_API_HEALTH_URL }}"

      - name: Resolve frontend URL
        id: frontend_url
        run: |
          target_url="${{ vars.STAGING_WEB_URL }}"
          if [ -z "$target_url" ]; then
            target_url="${{ needs.deploy-frontend.outputs.preview_url }}"
          fi

          if [ -z "$target_url" ]; then
            echo "No staging frontend URL available. Set STAGING_WEB_URL or ensure Vercel deploy outputs a URL."
            exit 1
          fi

          echo "target_url=$target_url" >> "$GITHUB_OUTPUT"

      - name: Frontend smoke check
        run: |
          curl -fsSL "${{ steps.frontend_url.outputs.target_url }}" > /dev/null

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Lighthouse performance gate (>= 90)
        run: |
          npm install --no-save lighthouse
          npx lighthouse "${{ steps.frontend_url.outputs.target_url }}" \
            --only-categories=performance \
            --output=json \
            --output-path=./lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox"

          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('./lighthouse-report.json','utf8')); const score=Math.round(report.categories.performance.score*100); console.log('Lighthouse performance score:', score); if (score < 90) process.exit(1);"
